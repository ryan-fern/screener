name: Daily Screener Fetch

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 6am ET, weekdays only (markets closed on weekends)
  workflow_dispatch:           # also allows a manual "Run workflow" button in GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener fetch
        run: python fetch.py

      - name: Commit updated screener data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_data.json
          git diff --staged --quiet || git commit -m "chore: update screener data [skip ci]"
          git push
